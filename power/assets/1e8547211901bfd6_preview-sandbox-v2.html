        if (!tailwindFontUtilityCss) {
          return;
        }

        const fontStyle = document.createElement("style");
        fontStyle.setAttribute(MANAGED_PREVIEW_HEAD_ATTR, "true");
        fontStyle.setAttribute(
          MANAGED_PREVIEW_FONT_ATTR,
          "tailwind-config-font-utilities",
        );
        fontStyle.textContent = tailwindFontUtilityCss;
        document.head.appendChild(fontStyle);
      }

      async function syncPreviewFontUtilities(modules) {
        const detectedFontClasses = collectPreviewFontClasses(modules);
        if (detectedFontClasses.length === 0) {
          return;
        }

        const pendingFontLoads = [];

        if (!hasHeadLinkWithHrefSubstring("fonts.googleapis.com")) {
          const preconnectGoogle = document.createElement("link");
          preconnectGoogle.rel = "preconnect";
          preconnectGoogle.href = "https://fonts.googleapis.com";
          preconnectGoogle.setAttribute(MANAGED_PREVIEW_HEAD_ATTR, "true");
          preconnectGoogle.setAttribute(
            MANAGED_PREVIEW_FONT_ATTR,
            "preconnect-googleapis",
          );
          document.head.appendChild(preconnectGoogle);
        }

        if (!hasHeadLinkWithHrefSubstring("fonts.gstatic.com")) {
          const preconnectGstatic = document.createElement("link");
          preconnectGstatic.rel = "preconnect";
          preconnectGstatic.href = "https://fonts.gstatic.com";
          preconnectGstatic.setAttribute("crossorigin", "");
          preconnectGstatic.setAttribute(MANAGED_PREVIEW_HEAD_ATTR, "true");
          preconnectGstatic.setAttribute(
            MANAGED_PREVIEW_FONT_ATTR,
            "preconnect-gstatic",
          );
          document.head.appendChild(preconnectGstatic);
        }

        detectedFontClasses.forEach((fontClass) => {
          const googleFontSpec = PREVIEW_FONT_CLASS_TO_GOOGLE_FONT[fontClass];
          const fontUtilityCss = PREVIEW_FONT_CLASS_TO_CSS[fontClass];

          if (
            googleFontSpec &&
            !hasHeadLinkWithHrefSubstring(`family=${googleFontSpec}`)
          ) {
            const fontLink = document.createElement("link");
            fontLink.rel = "stylesheet";
            fontLink.href = `https://fonts.googleapis.com/css2?family=${googleFontSpec}&display=swap`;
            fontLink.setAttribute(MANAGED_PREVIEW_HEAD_ATTR, "true");
            fontLink.setAttribute(MANAGED_PREVIEW_FONT_ATTR, fontClass);
            document.head.appendChild(fontLink);
            pendingFontLoads.push(waitForHeadLinkLoad(fontLink));
          }

          if (fontUtilityCss && !hasFontUtilityStyle(fontClass)) {
            const fontStyle = document.createElement("style");
            fontStyle.setAttribute(MANAGED_PREVIEW_HEAD_ATTR, "true");
            fontStyle.setAttribute(
              MANAGED_PREVIEW_FONT_ATTR,
              `${fontClass}-style`,
            );
            fontStyle.textContent = fontUtilityCss;
            document.head.appendChild(fontStyle);
          }
        });

        if (pendingFontLoads.length > 0) {
          await Promise.allSettled(pendingFontLoads);
        }
      }

      function resetManagedPreviewHead() {
        document
          .querySelectorAll(`[${MANAGED_PREVIEW_HEAD_ATTR}="true"]`)
          .forEach((element) => element.remove());
      }

      function syncBodyShell(sourceBody) {
        const nextClassName = sourceBody?.getAttribute("class") || "";
        const nextStyle = sourceBody?.getAttribute("style") || "";
        const nextDir = sourceBody?.getAttribute("dir") || "";

        if (nextClassName) {
          document.body.setAttribute("class", nextClassName);
        } else {
          document.body.removeAttribute("class");
        }

        if (nextStyle) {
          document.body.setAttribute("style", nextStyle);
        } else {
          document.body.removeAttribute("style");
        }

        if (nextDir) {
          document.body.setAttribute("dir", nextDir);
        } else {
          document.body.removeAttribute("dir");
        }
      }

      function syncDocumentElementShell(sourceDocumentElement) {
        const requestedLang =
          sourceDocumentElement?.getAttribute("lang") || "en";
        const nextClassName =
          sourceDocumentElement?.getAttribute("class") || "";
        const nextStyle = sourceDocumentElement?.getAttribute("style") || "";
        const nextDir = sourceDocumentElement?.getAttribute("dir") || "";

        document.documentElement.setAttribute("lang", requestedLang);

        if (nextClassName) {
          document.documentElement.setAttribute("class", nextClassName);
        } else {
          document.documentElement.removeAttribute("class");
        }

        if (nextStyle) {
          document.documentElement.setAttribute("style", nextStyle);
        } else {
          document.documentElement.removeAttribute("style");
        }

        if (nextDir) {
          document.documentElement.setAttribute("dir", nextDir);
        } else {
          document.documentElement.removeAttribute("dir");
        }
      }

      async function syncPreviewDocumentShell(modules) {
        resetManagedPreviewHead();

        const htmlSource =
          modules["index.html"] || modules["public/index.html"] || "";

        if (typeof htmlSource !== "string" || !htmlSource.trim()) {
          document.title = "Preview Sandbox";
          syncDocumentElementShell(null);
          syncBodyShell(null);
          return;
        }

        const parsedDocument = new DOMParser().parseFromString(
          htmlSource,
          "text/html",
        );
        const requestedTitle = parsedDocument.title?.trim();
        const pendingHeadLoads = [];

        document.title = requestedTitle || "Preview Sandbox";
        syncDocumentElementShell(parsedDocument.documentElement);

        Array.from(parsedDocument.head.children).forEach((node) => {
          const tagName = node.tagName.toLowerCase();

          if (tagName === "title") {
            return;
          }

          if (tagName === "style") {
            const clonedStyle = node.cloneNode(true);
            clonedStyle.setAttribute(MANAGED_PREVIEW_HEAD_ATTR, "true");
            document.head.appendChild(clonedStyle);
            return;
          }

          if (tagName === "link" && shouldCopyHeadLink(node)) {
            const clonedLink = node.cloneNode(true);
            clonedLink.setAttribute(MANAGED_PREVIEW_HEAD_ATTR, "true");
            document.head.appendChild(clonedLink);

            pendingHeadLoads.push(waitForHeadLinkLoad(clonedLink));
          }
        });

        syncBodyShell(parsedDocument.body);

        if (pendingHeadLoads.length > 0) {
          await Promise.allSettled(pendingHeadLoads);
        }
      }

      const GENERIC_FONT_FAMILIES = new Set([
        "serif",
        "sans-serif",
        "monospace",
        "cursive",
        "fantasy",
        "system-ui",
        "ui-serif",
        "ui-sans-serif",
        "ui-monospace",
        "emoji",
        "math",
        "fangsong",
        "inherit",
        "initial",
        "unset",
      ]);

      function extractFontFamilyNames(fontFamilyValue) {
        if (typeof fontFamilyValue !== "string" || !fontFamilyValue.trim()) {
          return [];
        }

        return fontFamilyValue
          .split(",")
          .map((family) => family.trim().replace(/^['"]+|['"]+$/g, ""))
          .filter((family) => {
            if (!family) {
              return false;
            }

            return !GENERIC_FONT_FAMILIES.has(family.toLowerCase());
          });
      }

      function collectRenderedFontFamilies(rootElement) {
        if (!rootElement || typeof window.getComputedStyle !== "function") {
          return [];
        }

        const families = new Set();
        const elements = [rootElement, ...rootElement.querySelectorAll("*")];

        elements.forEach((element) => {
          try {
            const computedStyles = window.getComputedStyle(element);
            extractFontFamilyNames(computedStyles.fontFamily).forEach(
              (family) => families.add(family),
            );
          } catch (error) {
            // Ignore detached nodes or style resolution edge cases.
          }
        });

        return Array.from(families);
      }

      async function waitForRenderedFonts(rootElement, timeoutMs = 4500) {
        if (!document.fonts?.load || !rootElement) {
          return;
        }

        const renderedFamilies = collectRenderedFontFamilies(rootElement);
        if (renderedFamilies.length === 0) {
          return;
        }

        const fontLoadPromise = Promise.allSettled(
          renderedFamilies.map((family) =>
            document.fonts.load(`1em "${family}"`),
          ),
        );

        await Promise.race([
          fontLoadPromise,
          new Promise((resolve) => window.setTimeout(resolve, timeoutMs)),
        ]);

        await new Promise((resolve) => requestAnimationFrame(() => resolve()));
      }

      function applyPreviewSourceInstanceAttributes(rootElement) {
        if (
          !rootElement ||
          (typeof Node === "function" && !(rootElement instanceof Node)) ||
          typeof rootElement.querySelectorAll !== "function"
        ) {
          return;
        }

        const groupedElements = new Map();
        const tracedElements = rootElement.querySelectorAll(
          `[${PREVIEW_SOURCE_PATH_ATTRIBUTE}]`,
        );

        tracedElements.forEach((element) => {
          const sourcePath =
            element.getAttribute(PREVIEW_SOURCE_PATH_ATTRIBUTE) || "";
          const sourceLine =
            element.getAttribute(PREVIEW_SOURCE_LINE_ATTRIBUTE) || "";
          const sourceColumn =
            element.getAttribute(PREVIEW_SOURCE_COLUMN_ATTRIBUTE) || "";
          const sourceTag =
            element.getAttribute(PREVIEW_SOURCE_TAG_ATTRIBUTE) ||
            element.tagName.toLowerCase();
          const key = `${sourcePath}::${sourceLine}::${sourceColumn}::${sourceTag}`;
          const currentGroup = groupedElements.get(key) || [];
          currentGroup.push(element);
          groupedElements.set(key, currentGroup);
        });

        groupedElements.forEach((elements) => {
          elements.forEach((element, index) => {
            element.setAttribute(
              PREVIEW_SOURCE_INSTANCE_ATTRIBUTE,
              String(index),
            );
          });
        });
      }

      function schedulePreviewSourceInstanceStamp(rootElement) {
        const applyStamp = () =>
          applyPreviewSourceInstanceAttributes(rootElement);
        requestAnimationFrame(() => {
          applyStamp();
          requestAnimationFrame(applyStamp);
        });
      }

      function hasTailwindGradientBackgroundClass(className) {
        if (typeof className !== "string" || !className.trim()) {
          return false;
        }

        const tokens = className.split(/\s+/).filter(Boolean);
        const hasGradientDirection = tokens.some(
          (token) =>
            token.startsWith("bg-gradient-to-") ||
            token.startsWith("bg-[radial-gradient") ||
            token.startsWith("bg-[conic-gradient"),
        );

        return (
          hasGradientDirection &&
          tokens.some((token) => token.startsWith("from-")) &&
          tokens.some((token) => token.startsWith("to-"))
        );
      }

      function extractTailwindBackgroundImageUrl(className) {
        if (typeof className !== "string" || !className.trim()) {
          return null;
        }

        const match = className.match(/bg-\[url\((.*?)\)\]/);
        if (!match?.[1]) {
          return null;
        }

        const trimmedValue = match[1].trim();
        if (
          (trimmedValue.startsWith("'") && trimmedValue.endsWith("'")) ||
          (trimmedValue.startsWith('"') && trimmedValue.endsWith('"'))
        ) {
          return trimmedValue.slice(1, -1);
        }

        return trimmedValue;
      }

      function applyCompositeTailwindBackgroundFix(rootElement) {
        if (
          !rootElement ||
          typeof rootElement.querySelectorAll !== "function"
        ) {
          return 0;
        }

        const elements = [
          rootElement,
          ...rootElement.querySelectorAll("[class]"),
        ];
        let appliedCount = 0;

        elements.forEach((element) => {
          const className = element.getAttribute("class") || "";
          if (!hasTailwindGradientBackgroundClass(className)) {
            return;
          }

          const imageUrl = extractTailwindBackgroundImageUrl(className);
          if (!imageUrl) {
            return;
          }

          const computedBackgroundImage =
            window.getComputedStyle(element).backgroundImage || "";
          if (
            !computedBackgroundImage.includes("gradient(") ||
            computedBackgroundImage.includes("url(")
          ) {
            return;
          }

          const escapedUrl = imageUrl.replace(/"/g, '\\"');
          element.style.backgroundImage = `${computedBackgroundImage}, url("${escapedUrl}")`;
          appliedCount += 1;
        });

        return appliedCount;
      }

      function scheduleCompositeTailwindBackgroundFix(rootElement) {
        if (
          !rootElement ||
          (typeof Node === "function" && !(rootElement instanceof Node)) ||
          typeof rootElement.querySelectorAll !== "function"
        ) {
          return;
        }

        let attempts = 0;
        const maxAttempts = 12;
        const retryDelays = [0, 16, 40, 80, 140, 220, 320];
        let observer = null;

        const runAttempt = () => {
          attempts += 1;
          const appliedCount = applyCompositeTailwindBackgroundFix(rootElement);
          if (appliedCount > 0 || attempts >= maxAttempts) {
            if (observer) {
              observer.disconnect();
            }
            return;
          }

          if (attempts <= 4) {
            window.requestAnimationFrame(runAttempt);
            return;
          }

          const retryDelay =
            retryDelays[Math.min(attempts - 1, retryDelays.length - 1)];
          window.setTimeout(runAttempt, retryDelay);
        };

        if (typeof MutationObserver === "function") {
          observer = new MutationObserver(() => {
            applyCompositeTailwindBackgroundFix(rootElement);
          });
          observer.observe(rootElement, {
            subtree: true,
            childList: true,
            attributes: true,
            attributeFilter: ["class", "style"],
          });

          window.setTimeout(() => {
            if (observer) {
              observer.disconnect();
            }
          }, 2000);
        }

        runAttempt();
      }

      // Render app
      function renderApp(mainModule) {
        try {
          const { reactModule, reactDomClientModule } =
            syncReactPreviewRuntimeGlobals();
          const loadedModule = require(mainModule);
          const App = resolveRenderableModuleExport(loadedModule);
          const rootElement = document.getElementById("root");

          if (!reactModule || typeof reactModule.createElement !== "function") {
            throw new Error(
              "React preview runtime is unavailable; createElement could not be initialized.",
            );
          }

          if (
            !reactDomClientModule ||
            typeof reactDomClientModule.createRoot !== "function"
          ) {
            throw new Error(
              "ReactDOM/client preview runtime is unavailable; createRoot could not be initialized.",
            );
          }

          if (typeof App !== "function") {
            throw new Error(
              `Main module "${mainModule}" does not export a renderable React component`,
            );
          }

          // Create root only once, reuse for subsequent renders (React 18 best practice)
          if (!__reactRoot) {
            __reactRoot = reactDomClientModule.createRoot(rootElement);
            if (DEBUG)
              console.log(
                "✅ React root created (will be reused for hot reloads)",
              );
          }

          // Render app (reuses existing root)
          __reactRoot.render(reactModule.createElement(App));
          schedulePreviewSourceInstanceStamp(rootElement);

          if (DEBUG) console.log("✅ App rendered successfully");
        } catch (error) {
          console.error("❌ Render error:", error);
          const payload = buildErrorPayload("Render Error", error, {
            source: mainModule,
          });
          throw attachErrorPayload(error, payload);
        }
      }

      // Inject CSS files into the document head
      function injectCSS(cssContent) {
        // Remove old custom CSS if exists
        const oldStyle = document.getElementById("custom-styles");
        if (oldStyle) {
          oldStyle.remove();
        }

        // Create new style element
        const style = document.createElement("style");
        style.id = "custom-styles";
        style.textContent = cssContent;
        document.head.appendChild(style);
        if (DEBUG) console.log("💅 CSS injected");
      }

      // Listen for messages from parent
      window.addEventListener("message", (event) => {
        const message = event.data;

        // Handle refresh message (like Sandpack does)
        if (message.type === "REFRESH") {
          if (DEBUG) console.log("🔄 Received refresh message - reloading...");
          storeRefreshPath(message.path);

          let nextSandboxUrl = PREVIEW_SANDBOX_FALLBACK_URL;

          if (
            typeof message.sandboxUrl === "string" &&
            message.sandboxUrl.trim()
          ) {
            nextSandboxUrl = message.sandboxUrl;
          }

          document.location.replace(nextSandboxUrl);
          return;
        }

        if (message.type === "NAVIGATE") {
          if (typeof message.path === "string" && message.path.trim()) {
            applyPreviewPath(message.path, {
              notifyParent: true,
              dispatchPopstate: true,
            });
          }
          return;
        }

        // Handle file updates
        if (message.type === "UPDATE_MODULES") {
          (async () => {
            try {
              if (DEBUG)
                console.log("📦 Received modules update", {
                  fileCount: Object.keys(message.modules).length,
                  mainModule: message.mainModule,
                });

              // Save scroll position BEFORE any DOM changes (for scroll preservation)
              const savedScrollX = window.scrollX || window.pageXOffset || 0;
              const savedScrollY = window.scrollY || window.pageYOffset || 0;

              // Clear cache
              Object.keys(__cache).forEach((key) => delete __cache[key]);
              window.__AURA_PREVIEW_PRECOMPILED = message.precompiled === true;

              // Replace modules so deleted files stop resolving in the sandbox
              Object.keys(__modules).forEach((path) => {
                if (
                  !Object.prototype.hasOwnProperty.call(message.modules, path)
                ) {
                  delete __modules[path];
                }
              });
              Object.assign(__modules, message.modules);

              if (typeof message.path === "string" && message.path.trim()) {
                applyPreviewPath(message.path, {
                  notifyParent: false,
                  dispatchPopstate: false,
                });
              }

              await syncPreviewDocumentShell(message.modules);

              const bareImports = Array.isArray(message.externalImports)
                ? message.externalImports
                : collectBareImports(message.modules);
              await preloadExternalModules(bareImports);
              assertReactPreviewRuntimeConsistency();

              // Inject CSS files (src/index.css, etc.)
              const cssFiles = Object.keys(message.modules).filter((path) =>
                path.endsWith(".css"),
              );
              if (cssFiles.length > 0) {
                const allCSS = cssFiles
                  .map((path) => message.modules[path])
                  .join("\n\n");
                injectCSS(allCSS);
              }

              await syncPreviewFontUtilities(message.modules);
              syncTailwindFontUtilities(message.modules);

              // Render
              renderApp(message.mainModule);

              const renderedRoot =
                document.getElementById("root") || document.body;
              scheduleCompositeTailwindBackgroundFix(renderedRoot);
              await waitForRenderedFonts(renderedRoot);
              ensurePreviewBrowserGlobals();
              schedulePreviewAnimationRecovery(renderedRoot);

              // Restore scroll position after React completes render (use requestAnimationFrame for perfect timing)
              requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                  restorePendingRefreshPath();
                  window.scrollTo(savedScrollX, savedScrollY);
                  notifyParentOfLocationChange();
                  if (DEBUG)
                    console.log("✅ Restored scroll position:", {
                      x: savedScrollX,
                      y: savedScrollY,
                    });
                });
              });

              // Notify parent
              window.parent.postMessage(
                {
                  type: "RENDER_COMPLETE",
                  success: true,
                },
                "*",
              );
            } catch (error) {
              console.error("❌ Module preload/render error:", error);
              const payload =
                getAttachedErrorPayload(error) ||
                buildErrorPayload("Preview Error", error, {
                  source: message.mainModule,
                });
              showError(
                payload.title,
                payload.error || "Failed to render preview",
                payload.stack,
                payload,
              );
              notifyParentOfRenderError(payload);
            }
          })();
        }
      });

      // Wait for ESM dependencies to load before notifying parent
      function waitForDependencies() {
        return new Promise((resolve) => {
          // Check if already loaded
          if (
            (window.__esmDepsReady || window.__esmDepsError) &&
            window.Babel
          ) {
            if (DEBUG) console.log("✅ All dependencies already loaded");
            resolve();
            return;
          }

          let attempts = 0;
          const maxAttempts = 100; // 5 seconds max wait

          const checkDependencies = () => {
            attempts++;

            // Wait for ESM deps + Babel
            if (
              (window.__esmDepsReady || window.__esmDepsError) &&
              window.Babel
            ) {
              if (DEBUG)
                console.log("✅ Essential dependencies loaded", {
                  React: !!window.__reactESM,
                  ReactDOM: !!window.__reactDomESM,
                  ReactDOMClient: !!window.__reactDomClientESM,
                  LucideReact: !!window.__lucideReactESM,
                  LucideExports: window.__lucideReactESM
                    ? Object.keys(window.__lucideReactESM).length
                    : 0,
                  UnicornStudio: !!window.__unicornStudioESM,
                  Babel: !!window.Babel,
                });
              resolve();
            } else if (attempts >= maxAttempts) {
              if (DEBUG)
                console.warn(
                  "⚠️ Some dependencies not loaded after timeout, proceeding anyway",
                  {
                    esmDepsReady: !!window.__esmDepsReady,
                    Babel: !!window.Babel,
                  },
                );
              resolve();
            } else {
              setTimeout(checkDependencies, 50);
            }
          };

          checkDependencies();
        });
      }

      // Track ready acknowledgment at global scope so event listener can access it
      let readyAcknowledged = false;

      // Stop retrying when parent sends UPDATE_MODULES
      window.addEventListener("message", (event) => {
        if (event.data.type === "UPDATE_MODULES") {
          if (DEBUG)
            console.log(
              "✅ Parent acknowledged - stopping SANDBOX_READY retries",
            );
          readyAcknowledged = true;
        }
      });

      // Notify parent that sandbox is ready (after dependencies load)
      waitForDependencies().then(() => {
        if (DEBUG) console.log("✅ Sandbox ready - sending SANDBOX_READY");
        let retryCount = 0;
        const MAX_RETRIES = 20; // Keep the parent/iframe handshake alive for slower preview loads.
        const READY_RETRY_DELAY_MS = 250;

        const sendReadyMessage = () => {
          if (!readyAcknowledged && retryCount < MAX_RETRIES) {
            if (DEBUG)
              console.log(
                `📤 Sending SANDBOX_READY (attempt ${retryCount + 1}/${MAX_RETRIES})`,
              );
            window.parent.postMessage({ type: "SANDBOX_READY" }, "*");
            retryCount++;

            if (retryCount < MAX_RETRIES) {
              setTimeout(sendReadyMessage, READY_RETRY_DELAY_MS);
            }
          } else if (readyAcknowledged) {
            if (DEBUG)
              console.log("✅ SANDBOX_READY acknowledged, stopping retries");
          }
        };

        sendReadyMessage();
      });

      // Global error handling
      window.onerror = function (message, source, lineno, colno, error) {
        const payload = buildErrorPayload("Runtime Error", error || message, {
          source,
          line: lineno,
          column: colno,
        });
        console.error("❌ Runtime Error");
        showError(payload.title, payload.error, payload.stack, payload);
        notifyParentOfRenderError(payload);
        return true;
      };

      window.onunhandledrejection = function (event) {
        const payload = buildErrorPayload(
          "Unhandled Promise Rejection",
          event.reason,
        );
        console.error("❌ Unhandled Promise Rejection");
        showError(payload.title, payload.error, payload.stack, payload);
        notifyParentOfRenderError(payload);
      };
    </script>
  </body>
</html>
